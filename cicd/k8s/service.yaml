apiVersion: v1
kind: Service
metadata:
  name: user-account-service
  labels:
    app: user-account-service
spec:
  type: ClusterIP
  selector:
    app: user-account-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
