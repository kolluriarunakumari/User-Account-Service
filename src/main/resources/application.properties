# Application
spring.application.name=user-account-service
server.port=8080

# H2 Database (in-memory for dev/demo)
spring.datasource.url=jdbc:h2:mem:useraccountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App Info
info.app.name=User Account Microservice
info.app.version=1.0.0
info.app.description=Manages User IDs and Account Numbers

# Logging
logging.level.com.microservice=DEBUG
logging.level.org.springframework.web=INFO
