version: '3.8'

services:
  user-account-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-account-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - microservice-net

networks:
  microservice-net:
    driver: bridge
